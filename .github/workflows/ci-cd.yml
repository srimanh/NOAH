name: NOAH CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: noah-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  cli:
    name: CLI / Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node-version: ["22", "24"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build CLI and SDK
        run: npm run build

      - name: Run test suite
        run: npm test

      - name: Supply-chain integrity (pinned + bundled core runtime)
        run: npm run verify:deps

      - name: Verify package contents
        if: matrix.node-version == '24'
        run: npm pack --dry-run

  web:
    name: Web / Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci --ignore-scripts

      - name: Build landing page
        working-directory: web
        run: npm run build

      - name: Smoke-test Pages output
        working-directory: web
        run: |
          test -s dist/index.html
          test -n "$(find dist/assets -type f -print -quit)"
          grep -q '/NOAH/assets/' dist/index.html

      - name: Upload web build
        uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: web/dist
          if-no-files-found: error
          retention-days: 7

  pages:
    name: Pages / Package
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: [cli, web]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write

    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Download verified web build
        uses: actions/download-artifact@v8
        with:
          name: web-dist
          path: web-dist

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: web-dist

  deploy:
    name: Pages / Deploy
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: pages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Publish deployment summary
        run: |
          {
            echo "## NOAH is live"
            echo ""
            echo "Deployed commit \`${GITHUB_SHA::7}\` to:"
            echo ""
            echo "${{ steps.deployment.outputs.page_url }}"
          } >> "$GITHUB_STEP_SUMMARY"
