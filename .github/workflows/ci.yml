name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install (frozen lockfile)
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Supply-chain integrity (pinned + bundled core runtime)
        run: npm run verify:deps
